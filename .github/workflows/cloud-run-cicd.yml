name: Cloud Run CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'project-98c83c2b-f615-4eb7-93e' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GCP_SERVICE: ${{ vars.GCP_SERVICE || 'facturador-gmail-trigger' }}
  GCP_ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY || 'cloud-run-source-deploy' }}
  GCP_IMAGE_NAME: ${{ vars.GCP_IMAGE_NAME || 'facturador-gmail-trigger' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m compileall src run.py run_mail_automation.py run_mail_trigger_service.py main.py

  deploy:
    name: Deploy Cloud Run
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPOSITORY }}/${{ env.GCP_IMAGE_NAME }}:${GITHUB_SHA}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker build --tag "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy revision
        run: |
          gcloud run services update "${{ env.GCP_SERVICE }}" \
            --region "${{ env.GCP_REGION }}" \
            --image "${IMAGE}"

      - name: Show active revision
        run: |
          gcloud run services describe "${{ env.GCP_SERVICE }}" \
            --region "${{ env.GCP_REGION }}" \
            --format="value(status.latestReadyRevisionName,status.url)"
